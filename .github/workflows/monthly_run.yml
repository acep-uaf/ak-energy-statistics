name: Monthly Data Pipeline Run

on:
  push:
    branches:
      - ian/add-github-workflow # Delete this and previous two lines before merge to main!
  # schedule:
  #   # Fresh data arrives on day 7, runs on day 10 of every month
  #   - cron: '0 0 10 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      RENV_PATHS_ROOT: ~/.cache/R/renv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Run pipeline script
        run: |
          chmod +x main.sh
          ./main.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up Git's index first so it doesn't get confused by R's unlink() steps
          git rm -r --cached data/l0_extracted/ data/l1_quality_checked/ data/l2_transformed/ data/l3_outliers_checked/ --ignore-unmatch

          # Add the entire data directory
          git add data/

          # Commit only if there are actual changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update monthly data layers [skip ci]"

            # Fetch latest changes and apply our new data commit on top to prevent merge conflicts
            git pull --rebase origin ${{ github.ref_name }}

            # Push back to the current active branch
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes detected in data layers. Skipping push."
          fi
