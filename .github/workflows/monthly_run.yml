name: Monthly Data Pipeline & Quarto Publish

on:
  schedule:
    # Fresh data arrives on day 7, runs on day 10 of every month
    - cron: '0 0 10 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline-and-publish:
    runs-on: ubuntu-latest

    env:
      RENV_PATHS_ROOT: ~/.cache/R/renv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: ${{ env.RENV_PATHS_ROOT }}
          key: ${{ runner.os }}-renv-${{ hashFiles('**/renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Run pipeline script
        run: |
          chmod +x main.sh
          ./main.sh

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up Git's index first so it doesn't get confused by R's "unlink()" steps
          git rm -r --cached data/l0_extracted/ data/l1_quality_checked/ data/l2_transformed/ data/l3_outliers_checked/ --ignore-unmatch || true

          # Add the entire data directory
          git add data/

          # Check if git actually has changes staged to commit
          if ! git diff --cached --quiet; then
            echo "Changes detected. Committing..."
            git commit -m "Auto-update monthly data [skip ci]"

            # Fetch latest remote changes and push
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref }}
          else
            echo "No data changes detected. Keeping repository clean."
          fi


      - name: Render Quarto Website
        run: |
          cd site
          quarto render

      - name: Upload Website Artifacts to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
