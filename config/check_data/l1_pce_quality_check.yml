l0_pce_header:
  type_checks:
    character:
      - identifier
      - utility
      - community
      - purchased_from
      - other_1_kwh_type
      - other_2_kwh_type
      - umr_month
    numeric:
      - line_no
      - amount
      - powerhouse_consumption_kwh
      - peak_consumption_kw
      - residential_sold_to
      - commercial_sold_to
      - com_facil_sold_to
      - govt_facil_sold_to
      - unbilled_sold_to
      - most_recent_fuel_purch_price
      - fuel_used_gallons
      - non_fuel_expenses
      - fuel_cost
      - total_kwh_purchased
      - residential_customers
      - commercial_customers
      - com_facil_customers
      - govt_facil_customers
      - unbilled_customers
      - other_customers
      - diesel_kwh_generated
      - hydro_kwh_generated
      - other_1_kwh_generated
      - other_2_kwh_generated
      - fiscal_year
      - calendar_year
    logical:
      []

  category_mappings:
    # All values converted to upper case before mapping, then mapped to lowercase
    other_1_kwh_type:
      "SOLAR": "solar"
      "WIND": "wind"
      "HYDRO": "hydro"
      "NATURAL GAS": "natural_gas"
      "OTHER": "other"

    other_2_kwh_type:
      "SOLAR": "solar"
      "SOLAR 24": "solar"
      "SOLAR 24 KW": "solar"
      "WIND": "wind"
      "HYDRO": "hydro"
      "NATURAL GAS": "natural_gas"
      "NATRUAL GAS": "natural_gas"
      "NATURALGAS": "natural_gas"
      "OTHER": "other"
      # "+", "UNKNOWN-IPEC", and anything else omitted here automatically become NA

  constraints:
    not_null:
      - identifier
      - line_no
  bounds:
    powerhouse_consumption_kwh:
      min: 0
      max:
    peak_consumption_kw:
      min: 0
      max:




l0_pce_rate_line:
  type_checks:
    character:
      - identifier
      - rate_id
    numeric:
      - line_no
      - actual_rate
      - pro_rata_rate
      - check
      - residential_rate
      - pce_eligible_residential_kwh
      - pce_eligible_com_facil_kwh
      - pce_eligible_community_kwh
      - pce_eligible_kwh_total
    logical:
      []
  constraints:
    not_null:
      - identifier
      - line_no
  bounds:
    actual_rate:
      min: 0
      max:
    residential_rate:
      min: 0
      max:
